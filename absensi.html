<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Absensi SIGAP RANI</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
background:#07142E;
color:white;
margin:0;
font-family:Poppins,sans-serif;
}

header{
padding:20px;
text-align:center;
background:#0D47A1;
}

#reader{
width:100%;
max-width:500px;
margin:25px auto;
background:white;
padding:15px;
border-radius:15px;
}

.card{

width:90%;
max-width:500px;

margin:20px auto;

background:white;

color:#222;

padding:20px;

border-radius:15px;

}

.card h2{

margin:0 0 15px;

}

.card p{

margin:8px 0;

font-size:18px;

}

button{

width:100%;

padding:15px;

background:#00C853;

color:white;

font-size:18px;

border:none;

border-radius:10px;

cursor:pointer;

margin-top:20px;

}

</style>

</head>

<body>

<header>

<h2>SIGAP RANI</h2>

<p>Scan QR Absensi</p>

</header>

<div id="reader"></div>

<div class="card">

<h2>Data Siswa</h2>

<p><b>NIS :</b> <span id="nis">-</span></p>

<p><b>Nama :</b> <span id="nama">-</span></p>

<p><b>Kelas :</b> <span id="kelas">-</span></p>

<button onclick="kirim()">ABSEN SEKARANG</button>

</div>

<script>

const API="ISI_URL_APPS_SCRIPT_DISINI";

let dataQR="";

function sukses(qr){

dataQR=qr;

let pecah=qr.split("|");

document.getElementById("nis").innerHTML=pecah[0];

document.getElementById("nama").innerHTML=pecah[1];

document.getElementById("kelas").innerHTML=pecah[2];

}

let html5QrCode=new Html5Qrcode("reader");

html5QrCode.start(

{facingMode:"environment"},

{

fps:10,

qrbox:250

},

sukses

);

function kirim(){

fetch(API,{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

aksi:"absen",

guru:localStorage.getItem("guru"),

qr:dataQR

})

})

.then(r=>r.json())

.then(r=>{

alert(r.pesan);

location.reload();

});

}

</script>

</body>
</html>
