<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login Guru - SIGAP RANI</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#07142E;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

width:380px;
background:white;
padding:40px;
border-radius:20px;
text-align:center;

}

.login-box img{

width:110px;
margin-bottom:20px;

}

.login-box h2{

color:#0D47A1;
margin-bottom:10px;

}

.login-box p{

color:#666;
margin-bottom:30px;

}

input{

width:100%;
padding:15px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;

}

button{

width:100%;
padding:15px;
background:#0D47A1;
color:white;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;

}

button:hover{

background:#1565C0;

}

</style>

</head>

<body>

<div class="login-box">

<img src="img/logo.png">

<h2>SIGAP RANI</h2>

<p>Login Guru</p>

<input type="email" id="email" placeholder="Email Guru">

<button onclick="login()">

MASUK

</button>

</div>

<script>

const API="ISI_URL_APPS_SCRIPT_DISINI";

function login(){

let email=document.getElementById("email").value;

if(email==""){

alert("Masukkan Email");

return;

}

localStorage.setItem("guru",email);

window.location="absensi.html";

}

</script>

</body>
</html>
